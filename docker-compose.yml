version: '3.9'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: malamaraichage_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maraichage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maraichage_secret}
      POSTGRES_DB: ${POSTGRES_DB:-malamaraichage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maraichage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Node.js / Express
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: malamaraichage_server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-maraichage}:${POSTGRES_PASSWORD:-maraichage_secret}@postgres:5432/${POSTGRES_DB:-malamaraichage}
      JWT_SECRET: ${JWT_SECRET:-changez_ce_secret_en_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changez_ce_refresh_secret_en_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
    volumes:
      - uploads_data:/app/uploads
      - ./server:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  # Frontend React (développement)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: malamaraichage_client
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api/v1}
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
  uploads_data:
